<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hogwarts Orión | Tournament Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg-dark: #050505; --card-bg: rgba(20, 20, 20, 0.98); --border: rgba(212, 175, 55, 0.4); }
        body { margin: 0; background: var(--bg-dark); color: #e0e0e0; font-family: 'Inter', sans-serif; background-image: radial-gradient(circle at top, #1a1a2e 0%, #050505 100%); background-attachment: fixed; overflow-x: hidden; }
        .header { padding: 20px; text-align: center; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.5); }
        .header h1 { font-family: 'Cinzel', serif; color: var(--gold); letter-spacing: 4px; margin: 0; font-size: 1.5em; }
        
        .nav-tabs { display: flex; justify-content: center; background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .tab-btn { background: none; border: none; color: #777; padding: 15px; font-family: 'Cinzel'; cursor: pointer; font-size: 0.8em; transition: 0.3s; }
        .tab-btn.active { color: var(--gold); border-bottom: 2px solid var(--gold); text-shadow: 0 0 10px var(--gold); }

        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; display: none; }
        .active-section { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .pro-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); margin-bottom: 20px; }
        
        /* Brackets Dinámicos */
        .bracket-wrapper { display: flex; gap: 40px; overflow-x: auto; padding: 40px 10px; min-height: 600px; scrollbar-width: thin; }
        .bracket-column { min-width: 220px; display: flex; flex-direction: column; justify-content: space-around; gap: 20px; }
        .bracket-column h4 { font-family: 'Cinzel'; color: var(--gold); text-align: center; border-bottom: 1px solid var(--border); padding-bottom: 5px; font-size: 0.7em; }

        .match-box { background: #111; border: 1px solid #333; border-radius: 4px; overflow: hidden; position: relative; }
        .match-box:hover { border-color: var(--gold); }
        
        .p-name { 
            padding: 12px; cursor: pointer; transition: 0.2s; font-size: 0.85em; 
            display: flex; justify-content: space-between; border-bottom: 1px solid #222;
        }
        .p-name:hover { background: rgba(212, 175, 55, 0.1); color: var(--gold); }
        .p-name.winner { background: rgba(46, 125, 50, 0.3); color: #81c784; font-weight: bold; }
        
        /* Controles Admin */
        textarea { width: 100%; height: 120px; background: #000; color: #0f0; border: 1px solid #444; padding: 10px; font-family: monospace; border-radius: 4px; box-sizing: border-box; }
        select, .btn-action { width: 100%; padding: 15px; margin-top: 10px; border-radius: 4px; cursor: pointer; font-family: 'Cinzel'; font-weight: bold; border: 1px solid var(--gold); }
        .btn-action { background: var(--gold); color: #000; }
        .btn-action:hover { background: #fff; transform: scale(1.01); }
    </style>
</head>
<body>

<div class="header">
    <h1>Hogwarts Orión</h1>
    <span style="font-size: 0.6em; letter-spacing: 2px; color: #666;">SISTEMA AUTOMATIZADO DE TORNEOS</span>
</div>

<nav class="nav-tabs">
    <button class="tab-btn active" onclick="showTab('tab-setup')">Sorteo</button>
    <button class="tab-btn" onclick="showTab('tab-bracket')">Llaves Interactivas</button>
</nav>

<div id="tab-setup" class="container active-section">
    <div class="pro-card">
        <h3 style="font-family:'Cinzel'; color:var(--gold); margin-top:0;">Configurar Torneo de los Tres Magos</h3>
        
        <label>Capacidad del Cuadro:</label>
        <select id="bracket-size">
            <option value="16">Octavos (16 Duelistas)</option>
            <option value="32">Dieciseisavos (32 Duelistas)</option>
            <option value="64">Treintaidosavos (64 Duelistas)</option>
            <option value="128">Sesentaicuatroavos (128 Duelistas)</option>
        </select>

        <label style="display:block; margin-top:20px;">Lista de Inscritos:</label>
        <textarea id="player-input" placeholder="Nombre de los duelistas... uno por cada línea"></textarea>

        <button class="btn-action" onclick="initTournament()">INICIAR SORTEO MÁGICO ✨</button>
    </div>
</div>

<div id="tab-bracket" class="container" style="max-width: 100%;">
    <div class="pro-card" style="overflow: hidden;">
        <h3 style="font-family:'Cinzel'; text-align:center; color:var(--gold);">Mapa del Torneo (Haz clic en el ganador)</h3>
        <div id="bracket-render" class="bracket-wrapper">
            </div>
    </div>
</div>

<script>
    let tournamentData = [];

    function showTab(id) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active-section'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active-section');
        event.target.classList.add('active');
    }

    function initTournament() {
        const size = parseInt(document.getElementById('bracket-size').value);
        const input = document.getElementById('player-input').value.trim();
        let players = input.split('\n').filter(p => p.trim() !== "");

        if(players.length < 2) return alert("¡Por las barbas de Merlín! Necesitas más duelistas.");

        // Rellenar vacíos
        while(players.length < size) { players.push("--- VACANTE ---"); }

        // Sorteo aleatorio
        players = players.sort(() => Math.random() - 0.5);

        // Crear estructura de datos
        tournamentData = [];
        let currentRound = players;
        tournamentData.push(currentRound);

        renderTournament(size);
        showTab('tab-bracket');
    }

    function renderTournament(size) {
        const container = document.getElementById('bracket-render');
        container.innerHTML = "";
        
        const totalRounds = Math.log2(size);
        
        for (let r = 0; r < totalRounds; r++) {
            const col = document.createElement('div');
            col.className = 'bracket-column';
            col.innerHTML = `<h4>Ronda ${r + 1}</h4>`;
            
            let numMatches = size / Math.pow(2, r + 1);
            for (let m = 0; m < numMatches; m++) {
                const matchDiv = document.createElement('div');
                matchDiv.className = 'match-box';
                matchDiv.id = `round-${r}-match-${m}`;
                
                // Estos placeholders se llenarán con clics
                matchDiv.innerHTML = `
                    <div class="p-name" onclick="advance('${r}', '${m}', 0)" id="r${r}m${m}p0">?</div>
                    <div class="p-name" onclick="advance('${r}', '${m}', 1)" id="r${r}m${m}p1">?</div>
                `;
                col.appendChild(matchDiv);
            }
            container.appendChild(col);
        }

        // Poblar Ronda 1
        const firstRound = tournamentData[0];
        for(let i=0; i < firstRound.length; i++) {
            let matchIdx = Math.floor(i / 2);
            let playerIdx = i % 2;
            document.getElementById(`r0m${matchIdx}p${playerIdx}`).innerText = firstRound[i];
        }
    }

    function advance(round, match, player) {
        round = parseInt(round);
        match = parseInt(match);
        const playerName = document.getElementById(`r${round}m${match}p${player}`).innerText;

        if(playerName === "?" || playerName === "--- VACANTE ---") return;

        // Marcar visualmente al ganador
        document.getElementById(`r${round}m${match}p0`).classList.remove('winner');
        document.getElementById(`r${round}m${match}p1`).classList.remove('winner');
        document.getElementById(`r${round}m${match}p${player}`).classList.add('winner');

        // Mover a la siguiente ronda
        const nextRound = round + 1;
        const nextMatch = Math.floor(match / 2);
        const nextPos = match % 2;
        
        const nextId = `r${nextRound}m${nextMatch}p${nextPos}`;
        const target = document.getElementById(nextId);
        
        if(target) {
            target.innerText = playerName;
            // Limpiar ganadores de rondas futuras si se cambia un resultado previo
            clearFuture(nextRound, nextMatch, nextPos);
        } else {
            alert("¡Tenemos un Campeón del Torneo: " + playerName + "!");
        }
    }

    function clearFuture(r, m, p) {
        let nextR = r + 1;
        let nextM = Math.floor(m / 2);
        let nextP = m % 2;
        let tid = `r${nextR}m${nextM}p${nextP}`;
        let el = document.getElementById(tid);
        if(el) {
            el.innerText = "?";
            el.classList.remove('winner');
            clearFuture(nextR, nextM, nextP);
        }
    }
</script>

</body>
</html>
